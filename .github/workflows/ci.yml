name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Setup ⚙️
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies 📦
        run: npm ci
      - name: Lint ✏️
        run: npm run lint
      - name: Typecheck 🔎
        run: npm run typecheck
      - name: Astro check 🚀
        run: npx astro check
      - name: Test 🧪
        run: npm run test
      - name: Studio typecheck 🔎
        run: npm run studio:typecheck
      - name: Studio test 🧪
        run: npm run studio:test
      - name: Build 🔨
        run: npm run build
